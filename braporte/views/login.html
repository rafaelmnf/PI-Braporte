<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Braporte — Login</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

    <div class="login-wrapper">
        
        <!-- visual/branding -->
        <div class="login-hero">
            <div class="hero-overlay"></div>
            <div class="hero-grid"></div>
            <div class="hero-content">
                <div class="hero-icon">
                    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
                        <circle cx="12" cy="9" r="2.5"/>
                    </svg>
                </div>
                <h1>Braporte</h1>
                <p class="hero-tagline">Mapa de Segurança Urbana Colaborativo</p>
                <div class="hero-stats">
                    <div class="stat">
                        <span class="stat-number">—</span>
                        <span class="stat-label">Reportes</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat">
                        <span class="stat-number">—</span>
                        <span class="stat-label">Usuários</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat">
                        <span class="stat-number">—</span>
                        <span class="stat-label">Cidades</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- formulário -->
        <div class="login-form-side">
            <div class="form-container">
                
                <div class="mobile-logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#33d17a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
                        <circle cx="12" cy="9" r="2.5"/>
                    </svg>
                    <span>Braporte</span>
                </div>

                <h2>Entrar</h2>
                <p class="form-subtitle">Acesse para reportar e monitorar sua cidade.</p>

                <form id="loginForm" novalidate>
                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4l-10 8L2 4"/></svg>
                            <input type="email" id="email" placeholder="seu@email.com" autocomplete="username" required>
                        </div>
                        <span class="input-error" id="email-erro"></span>
                    </div>

                    <div class="input-group">
                        <label for="senha">Senha</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                            <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password" required>
                        </div>
                        <span class="input-error" id="senha-erro"></span>
                    </div>

                    <div class="input-group">
                        <label for="cpf">CPF</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            <input type="text" id="cpf" placeholder="000.000.000-00" autocomplete="off" required>
                        </div>
                        <span class="input-error" id="cpf-erro"></span>
                    </div>

                    <button type="submit" class="btn-entrar">
                        Entrar
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                    </button>
                </form>

                <div class="form-footer">
                    <span>Não tem conta?</span>
                    <a href="#" class="link-cadastro">Criar conta</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/login.js"></script>
</body>
</html>
